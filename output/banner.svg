<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Anay Sharma — Full-Stack Developer</title>
<desc>Aurora-style animated gradient banner with rounded corners</desc>
<defs>
<clipPath id="round">
<rect width="1200" height="280" rx="8"/>
</clipPath>

<radialGradient id="base" cx="50%" cy="30%" r="80%">
<stop offset="0%" stop-color="#0c2a22"/>
<stop offset="100%" stop-color="#031310"/>
</radialGradient>

<filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="55"/>
</filter>

<radialGradient id="aurora1" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#3fd39a" stop-opacity="0.9"/>
<stop offset="100%" stop-color="#3fd39a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aurora2" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#1a8f6b" stop-opacity="0.85"/>
<stop offset="100%" stop-color="#1a8f6b" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aurora3" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#0f5c52" stop-opacity="0.8"/>
<stop offset="100%" stop-color="#0f5c52" stop-opacity="0"/>
</radialGradient>

<radialGradient id="vignette" cx="50%" cy="50%" r="75%">
<stop offset="55%" stop-color="#000000" stop-opacity="0"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
</radialGradient>
</defs>

<g clip-path="url(#round)">
<rect width="1200" height="280" fill="url(#base)"/>

<g filter="url(#soft)">
<ellipse cx="250" cy="90" rx="260" ry="150" fill="url(#aurora1)">
<animate attributeName="cx" values="250;420;250" dur="16s" repeatCount="indefinite"/>
<animate attributeName="cy" values="90;150;90" dur="20s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.7;1;0.7" dur="9s" repeatCount="indefinite"/>
</ellipse>

<ellipse cx="900" cy="200" rx="300" ry="160" fill="url(#aurora2)">
<animate attributeName="cx" values="900;700;900" dur="18s" repeatCount="indefinite"/>
<animate attributeName="cy" values="200;110;200" dur="22s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.6;0.95;0.6" dur="11s" repeatCount="indefinite"/>
</ellipse>

<ellipse cx="620" cy="260" rx="340" ry="130" fill="url(#aurora3)">
<animate attributeName="cx" values="620;480;620" dur="21s" repeatCount="indefinite"/>
<animate attributeName="cy" values="260;190;260" dur="17s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.5;0.85;0.5" dur="13s" repeatCount="indefinite"/>
</ellipse>
</g>

<rect width="1200" height="280" fill="url(#vignette)"/>

<circle cx="600" cy="90" r="180" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
<circle cx="600" cy="90" r="240" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>

<text x="60" y="146" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="2.5" fill="#e9f5f0" opacity="0.85">
GITHUB.COM/ANAYSHARMA
</text>

<text x="1140" y="146" text-anchor="end" font-family="Helvetica, Arial, sans-serif" font-size="12" font-weight="600" letter-spacing="2.5" fill="#e9f5f0" opacity="0.85">
HELLO@ANAYSHARMA.DEV
</text>

<text x="600" y="122" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="42" fill="#f4faf7" letter-spacing="1">
ANAY SHARMA
</text>
<text x="600" y="164" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="30" fill="#f4faf7" letter-spacing="1">
FULL-STACK DEVELOPER
</text>

<g transform="translate(56,236)" opacity="0.9">
<circle cx="0" cy="0" r="15" fill="none" stroke="#e9f5f0" stroke-width="1.2"/>
<path d="M -6 3 Q 0 -7 6 3" fill="none" stroke="#e9f5f0" stroke-width="1.2" stroke-linecap="round"/>
</g>
</g>
</svg>
