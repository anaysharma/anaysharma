<svg viewBox="0 0 1200 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>Anay Sharma — Full-Stack Developer</title>
<desc>Aurora-style animated gradient banner with rounded corners</desc>
<defs>
<clipPath id="round">
<rect width="1200" height="280" rx="8"/>
</clipPath>

<radialGradient id="base" cx="50%" cy="30%" r="80%">
<stop offset="0%" stop-color="#0c2a22"/>
<stop offset="100%" stop-color="#031310"/>
</radialGradient>

<filter id="soft" x="-60%" y="-60%" width="220%" height="220%">
<feGaussianBlur stdDeviation="45"/>
</filter>

<radialGradient id="aurora1" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#3fd39a" stop-opacity="1"/>
<stop offset="100%" stop-color="#3fd39a" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aurora2" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#1a8f6b" stop-opacity="0.95"/>
<stop offset="100%" stop-color="#1a8f6b" stop-opacity="0"/>
</radialGradient>
<radialGradient id="aurora3" cx="50%" cy="50%" r="50%">
<stop offset="0%" stop-color="#0f5c52" stop-opacity="0.9"/>
<stop offset="100%" stop-color="#0f5c52" stop-opacity="0"/>
</radialGradient>

<radialGradient id="vignette" cx="50%" cy="50%" r="75%">
<stop offset="55%" stop-color="#000000" stop-opacity="0"/>
<stop offset="100%" stop-color="#000000" stop-opacity="0.55"/>
</radialGradient>
</defs>

<g clip-path="url(#round)">
<rect width="1200" height="280" fill="url(#base)"/>

<g filter="url(#soft)">
<ellipse cx="220" cy="80" rx="280" ry="170" fill="url(#aurora1)">
<animate attributeName="cx" values="220;520;220" dur="10s" repeatCount="indefinite"/>
<animate attributeName="cy" values="80;190;80" dur="13s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.6;1;0.6" dur="6s" repeatCount="indefinite"/>
</ellipse>

<ellipse cx="950" cy="210" rx="320" ry="180" fill="url(#aurora2)">
<animate attributeName="cx" values="950;650;950" dur="12s" repeatCount="indefinite"/>
<animate attributeName="cy" values="210;70;210" dur="15s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.55;1;0.55" dur="7s" repeatCount="indefinite"/>
</ellipse>

<ellipse cx="600" cy="260" rx="360" ry="150" fill="url(#aurora3)">
<animate attributeName="cx" values="600;280;600" dur="14s" repeatCount="indefinite"/>
<animate attributeName="cy" values="260;140;260" dur="11s" repeatCount="indefinite"/>
<animate attributeName="opacity" values="0.45;0.9;0.45" dur="8s" repeatCount="indefinite"/>
</ellipse>
</g>

<rect width="1200" height="280" fill="url(#vignette)"/>

<circle cx="600" cy="140" r="170" fill="none" stroke="#ffffff" stroke-opacity="0.07" stroke-width="1"/>
<circle cx="600" cy="140" r="225" fill="none" stroke="#ffffff" stroke-opacity="0.05" stroke-width="1"/>

<text x="55" y="144" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="1" fill="#e9f5f0" opacity="0.8">
linkedin.com/in/anay-sharma-b3785321a
</text>

<text x="1145" y="144" text-anchor="end" font-family="'JetBrains Mono', monospace" font-size="11" font-weight="500" letter-spacing="1" fill="#e9f5f0" opacity="0.8">
anaysharma8791@gmail.com
</text>

<text x="600" y="132" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="32" font-weight="600" fill="#f4faf7" letter-spacing="3">
ANAY SHARMA
</text>
<text x="600" y="168" text-anchor="middle" font-family="'JetBrains Mono', monospace" font-size="18" font-weight="400" fill="#cfe9e0" letter-spacing="4">
FULL-STACK DEVELOPER
</text>
</g>
</svg>